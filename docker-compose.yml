services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://remnawave:remnawave@postgres:5432/remnawave_tg_bot}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: remnawave_tg_bot
      POSTGRES_USER: remnawave
      POSTGRES_PASSWORD: remnawave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remnawave -d remnawave_tg_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
